<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Примерь фигурку</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>✨ Сделай фото с фигуркой ✨</h1>
        
        <!-- Видео с камеры (задний фон) -->
        <video id="camera-feed" playsinline autoplay muted></video>
        
        <!-- Наложение: Видео с фигуркой на прозрачном фоне -->
        <video id="overlay-video" src="роспись-1.webm" playsinline autoplay loop muted></video>

        <!-- Холст для захвата фото (скрыт) -->
        <canvas id="photo-canvas" style="display: none;"></canvas>

        <!-- Элемент для предпросмотра результата -->
        <img id="result-photo" alt="Ваше фото" style="display: none;"/>

        <div class="controls">
            <button id="capture-btn">📸 Сделать фото</button>
            <a id="download-btn" style="display: none;">💾 Сохранить фото</a>
        </div>

        <p class="hint">Нажми кнопку, чтобы сделать фото с фигуркой</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
